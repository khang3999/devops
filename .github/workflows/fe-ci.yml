name: Frontend CI
on:
  push:
    branches: 
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/fe-ci.yml"
  pull_request:
    branches: 
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/fe-ci.yml"
jobs:
  j-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build project
        run: npm run build